
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goutou Studio</title>
    <style>
        ul {
            list-style-type: none;
        }

        li p {
            color: #ffffff;
        }

        body {
            margin: 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: linear-gradient(-45deg, #076113, #2d3fa5, #0c5829, #b700ff);
            background-size: 400% 400%;
            animation: gradientAnimation 15s ease infinite;
            font-family: sans-serif;
        }

        @keyframes gradientAnimation {
            0% {
                background-position: 0% 50%;
            }
            25% {
                background-position: 100% 50%;
            }
            50% {
                background-position: 0% 50%;
            }
            75% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        .container {
            position: relative;
            text-align: center;
        }

        .logo {
            width: 100%;
            max-width: 400px;
            height: auto;
            z-index: 1;
        }

        h1 {
            font-size: 2em;
            color: #fff;
        }

        p {
            font-size: 1.2em;
            color: #000;
            margin-top: 10px;
        }

        .changelog-box {
            background: rgba(0, 0, 0, 0.473);
            color: #ffffff;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            max-width: 600px;
            margin: 20px auto;
        }

        .changelog-box h2 {
            color: #f31c00;
        }

        .changelog-box ul {
            list-style-type: none;
            padding: 0;
        }

        .changelog-box li {
            margin-bottom: 8px;
            color: #c94646;
        }

        .button {
            display: inline-block;
            padding: 10px 20px;
            margin-top: 20px;
            background-color: rgba(0, 0, 0, 0.479);
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
            transition: background-color 0.3s ease;
        }

        .button:hover {
            background-color: #0323d8;
        }

        @media only screen and (min-width: 600px) {
            h1 {
                font-size: 3em;
            }
            .changelog-box {
                padding: 10px;
            }
        }

        @media only screen and (max-width: 600px) {
            .logo {
                max-width: 80%;
            }
            p {
                font-size: 0.9em;
            }
            h1 {
                font-size: 1.0em;
            }
            ul {
                color: white;
            }
            .changelog-box {
                padding: 20px;
                width: 250px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <img class="logo" src="logo.png" alt="Logo">
        <p>@2024 Goutou Studio</p>
        <div class="changelog-box">
            <h2>v1.0 Beta1</h2>
            <ul>
                <li><p>SpaceOS 1.0 公测版（基于HariboteOS）</p></li>
                <li><p>“仅有2个人开发的简单系统。”</p></li>
                <li><p>感谢 @JiTianYu @Ceipfrp 制作，没有你们就没有spaceOS!</p></li>
                <li><p>提示：你还可以在这里跳转到我的西瓜主页！</p></li>
            </ul>
        </div>
        <a href="SpaceOS.img" class="button">下载SpaceOS</a>
        <a href="SpaceOSsource.zip" class="button">下载SpaceOS源代码</a>
        <a href="https://www.ixigua.com/home/2053495048635976?list_entrance=homepage" class="button">西瓜主页</a>
    </div>
</body>
</html>
